<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=1200, user-scalable=yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#1e293b">
    <title>نظام إدارة مكتب المحاماة الذكي - النسخة الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { 
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        .nav-link { 
            display: flex;
            align-items: center;
            width: 100%;
            padding: 12px 16px;
            text-align: right;
            transition: all 0.2s;
            border-radius: 12px;
            color: #cbd5e1;
        }
        .nav-link:hover { background-color: #1e293b; }
        .nav-link.active { background-color: #2563eb; color: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        #main-content { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* القائمة الجانبية للهواتف */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 1000;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 998;
        }
        
        .overlay.active { display: block; }
        
        /* تحسينات الهواتف */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                right: -280px;
                top: 0;
                width: 280px;
                height: 100vh;
                transition: right 0.3s ease;
                z-index: 999;
                overflow-y: auto;
            }
            .sidebar.open { right: 0; }
            .menu-toggle { display: block; }
            
            header { padding-right: 60px !important; padding-left: 12px !important; }
            #page-title { font-size: 16px !important; max-width: 160px !important; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            
            .p-8 { padding: 12px !important; }
            .p-6 { padding: 16px !important; }
            
            .grid-cols-1.md\:grid-cols-2.lg\:grid-cols-4 { grid-template-columns: 1fr !important; gap: 12px !important; }
            
            .overflow-x-auto { -webkit-overflow-scrolling: touch; }
            table { min-width: 600px; }
            
            input, select, textarea { font-size: 16px !important; }
            
            .grid-cols-2 { grid-template-columns: 1fr !important; }
            
            .modal-content { width: 95% !important; margin: 10px !important; max-height: 85vh !important; }
            
            .case-actions { flex-wrap: wrap; }
            .case-actions button { flex: 1; font-size: 12px; padding: 8px; }
        }
        
        @media (max-width: 480px) {
            #page-title { max-width: 120px !important; font-size: 14px !important; }
            header { padding-right: 55px !important; }
        }
        
        @media (min-width: 769px) and (max-width: 1024px) {
            .grid-cols-1.md\:grid-cols-2.lg\:grid-cols-4 { grid-template-columns: repeat(2, 1fr) !important; }
        }
        
        button, .nav-link, [onclick] { cursor: pointer; }
        @media (max-width: 768px) { button, .nav-link, [onclick] { min-height: 44px; } }
        
        .fixed { backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <button class="menu-toggle" onclick="toggleSidebar()">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>
    
    <div class="overlay" onclick="toggleSidebar()"></div>

    <div class="flex h-screen overflow-hidden">
        <aside class="sidebar w-72 bg-slate-900 text-white flex flex-col shadow-xl" style="direction: rtl;">
            <div class="p-6 text-center border-b border-slate-700">
                <h1 class="text-2xl font-bold tracking-wide">المحامي المحترف</h1>
                <p class="text-xs text-slate-400 mt-1">نظام إدارة المكاتب القانونية</p>
            </div>
            
            <nav class="flex-1 mt-6 px-4 space-y-2">
                <button onclick="router('dashboard'); closeSidebar();" class="nav-link">📊 لوحة التحكم</button>
                <button onclick="router('clients'); closeSidebar();" class="nav-link">👥 الموكلين</button>
                <button onclick="router('cases'); closeSidebar();" class="nav-link">⚖️ القضايا</button>
                <button onclick="router('calendar'); closeSidebar();" class="nav-link">📅 الأجندة</button>
                <button onclick="router('finance'); closeSidebar();" class="nav-link">💰 المالية</button>
                <button onclick="router('templates'); closeSidebar();" class="nav-link">📝 النماذج</button>
                <button onclick="router('tasks'); closeSidebar();" class="nav-link">✅ المهام</button>
                <button onclick="router('settings'); closeSidebar();" class="nav-link">⚙️ الإعدادات</button>
            </nav>

            <div class="p-4 border-t border-slate-700">
                <p class="text-center text-xs text-slate-500">© 2026 - الإصدار الاحترافي</p>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white shadow-sm flex items-center justify-between px-4 md:px-8" style="padding-right: 60px;">
                <h2 id="page-title" class="text-lg md:text-xl font-bold text-slate-700">لوحة التحكم</h2>
                <span id="current-date" class="text-xs md:text-sm text-gray-500 bg-gray-50 px-3 py-1 rounded-full"></span>
            </header>

            <section id="main-content" class="flex-1 overflow-y-auto p-4 md:p-8"></section>
        </main>
    </div>

    <!-- مودال الجلسات -->
    <div id="m-session" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-xl w-full max-w-md modal-content">
            <h3 class="font-bold text-xl mb-4">📅 إضافة جلسة</h3>
            <input type="date" id="s-date" class="w-full border p-3 rounded mb-3">
            <input type="time" id="s-time" class="w-full border p-3 rounded mb-3">
            <textarea id="s-decision" placeholder="قرار الجلسة" class="w-full border p-3 rounded mb-3" rows="3"></textarea>
            <input type="date" id="s-next-date" placeholder="تاريخ الجلسة القادمة" class="w-full border p-3 rounded mb-3">
            <input type="time" id="s-next-time" placeholder="وقت الجلسة القادمة" class="w-full border p-3 rounded mb-3">
            <textarea id="s-notes" placeholder="ملاحظات" class="w-full border p-3 rounded mb-3" rows="2"></textarea>
            <button onclick="saveSession()" class="bg-purple-600 text-white w-full py-3 rounded font-bold">حفظ الجلسة</button>
            <button onclick="toggleModal('m-session')" class="w-full mt-2 text-gray-400">إلغاء</button>
        </div>
    </div>

    <!-- مودال المستندات -->
    <div id="m-document" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-xl w-full max-w-md modal-content">
            <h3 class="font-bold text-xl mb-4">📄 رفع مستند</h3>
            <input type="text" id="doc-name" placeholder="اسم المستند" class="w-full border p-3 rounded mb-3">
            <select id="doc-type" class="w-full border p-3 rounded mb-3">
                <option value="توكيل">توكيل</option><option value="عقد">عقد</option><option value="مذكرة">مذكرة</option><option value="حكم">حكم</option><option value="محضر شرطة">محضر شرطة</option>
            </select>
            <input type="file" id="doc-file" class="w-full border p-3 rounded mb-3">
            <button onclick="saveDocument()" class="bg-indigo-600 text-white w-full py-3 rounded font-bold">رفع المستند</button>
            <button onclick="toggleModal('m-document')" class="w-full mt-2 text-gray-400">إلغاء</button>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
        
        function closeSidebar() {
            if (window.innerWidth <= 768) {
                const sidebar = document.querySelector('.sidebar');
                const overlay = document.querySelector('.overlay');
                sidebar.classList.remove('open');
                overlay.classList.remove('active');
            }
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeSidebar();
        });
        
        // تحديث التاريخ
        function updateDateTime() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
            const dateElem = document.getElementById('current-date');
            if (dateElem) dateElem.innerHTML = dateStr;
        }
        updateDateTime();
        setInterval(updateDateTime, 60000);
    </script>
    
    <script src="db.js"></script>
    <script src="app.js"></script>
</body>
</html>

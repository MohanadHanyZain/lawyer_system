<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة مكتب المحاماة الذكي - النسخة الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        .nav-link { @apply flex items-center w-full px-4 py-3 text-right transition-all duration-200 rounded-lg hover:bg-slate-800 text-slate-300; display: block; }
        .nav-link.active { @apply bg-blue-600 text-white shadow-lg; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        #main-content { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-72 bg-slate-900 text-white flex flex-col shadow-xl">
            <div class="p-6 text-center border-b border-slate-700">
                <h1 class="text-2xl font-bold tracking-wide">المحامي المحترف</h1>
                <p class="text-xs text-slate-400 mt-1">نظام إدارة المكاتب القانونية</p>
            </div>
            
            <nav class="flex-1 mt-6 px-4 space-y-2">
                <button onclick="router('dashboard')" class="nav-link">📊 لوحة التحكم</button>
                <button onclick="router('clients')" class="nav-link">👥 الموكلين</button>
                <button onclick="router('cases')" class="nav-link">⚖️ القضايا</button>
                <button onclick="router('calendar')" class="nav-link">📅 الأجندة</button>
                <button onclick="router('finance')" class="nav-link">💰 المالية</button>
                <button onclick="router('templates')" class="nav-link">📝 النماذج</button>
                <button onclick="router('tasks')" class="nav-link">✅ المهام</button>
                <button onclick="router('settings')" class="nav-link">⚙️ الإعدادات</button>
            </nav>

            <div class="p-4 border-t border-slate-700">
                <p class="text-center text-xs text-slate-500">© 2026 - الإصدار الاحترافي</p>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8">
                <h2 id="page-title" class="text-xl font-bold text-slate-700">لوحة التحكم</h2>
                <span id="current-date" class="text-sm text-gray-500"></span>
            </header>

            <section id="main-content" class="flex-1 overflow-y-auto p-8"></section>
        </main>
    </div>

    <!-- مودال الجلسات -->
    <div id="m-session" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-xl w-full max-w-md">
            <h3 class="font-bold text-xl mb-4">📅 إضافة جلسة</h3>
            <input type="date" id="s-date" class="w-full border p-3 rounded mb-3">
            <input type="time" id="s-time" class="w-full border p-3 rounded mb-3">
            <textarea id="s-decision" placeholder="قرار الجلسة" class="w-full border p-3 rounded mb-3" rows="3"></textarea>
            <input type="date" id="s-next-date" placeholder="تاريخ الجلسة القادمة" class="w-full border p-3 rounded mb-3">
            <input type="time" id="s-next-time" placeholder="وقت الجلسة القادمة" class="w-full border p-3 rounded mb-3">
            <textarea id="s-notes" placeholder="ملاحظات" class="w-full border p-3 rounded mb-3" rows="2"></textarea>
            <button onclick="saveSession()" class="bg-purple-600 text-white w-full py-3 rounded font-bold">حفظ الجلسة</button>
            <button onclick="toggleModal('m-session')" class="w-full mt-2 text-gray-400">إلغاء</button>
        </div>
    </div>

    <!-- مودال المستندات -->
    <div id="m-document" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-xl w-full max-w-md">
            <h3 class="font-bold text-xl mb-4">📄 رفع مستند</h3>
            <input type="text" id="doc-name" placeholder="اسم المستند" class="w-full border p-3 rounded mb-3">
            <select id="doc-type" class="w-full border p-3 rounded mb-3">
                <option value="توكيل">توكيل</option><option value="عقد">عقد</option><option value="مذكرة">مذكرة</option><option value="حكم">حكم</option><option value="محضر شرطة">محضر شرطة</option>
            </select>
            <input type="file" id="doc-file" class="w-full border p-3 rounded mb-3">
            <button onclick="saveDocument()" class="bg-indigo-600 text-white w-full py-3 rounded font-bold">رفع المستند</button>
            <button onclick="toggleModal('m-document')" class="w-full mt-2 text-gray-400">إلغاء</button>
        </div>
    </div>

    <script src="db.js"></script>
    <script src="app.js"></script>
</body>
</html>
